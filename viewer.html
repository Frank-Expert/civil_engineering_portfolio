<!DOCTYPE html>
<html>
<head>
    <title>PDF Viewer</title>
    <style>
        body {
            margin: 0;
            background: #0f172a;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

<iframe id="pdfFrame"></iframe>

<script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");

    document.getElementById("pdfFrame").src = file;
</script>

</body>
</html>
